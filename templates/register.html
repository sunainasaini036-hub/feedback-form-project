<!DOCTYPE html>
<html>

<head>

<title>Register | AI Form Studio</title>

<link rel="stylesheet" href="{{ url_for('static',filename='auth.css') }}">

</head>


<body>


<div class="auth-container">


<div class="auth-logo">

<h1>
AI <span>Form Studio</span>
</h1>

</div>



<h2>
Create Account
</h2>




<form method="POST">


<div class="form-group">

<label>Name</label>

<input
type="text"
name="name"
placeholder="Enter your name"
required>

</div>




<div class="form-group">

<label>Email</label>

<input
type="email"
name="email"
placeholder="Enter your email"
required>

</div>




<div class="form-group">

<label>Password</label>

<input
type="password"
name="password"
placeholder="Create password"
required>

</div>




<button class="auth-btn">

Register

</button>



</form>



<div class="auth-link">

Already have an account?

<a href="/login">

Login

</a>

</div>



</div>


</body>


</html>
