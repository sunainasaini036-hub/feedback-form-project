<!DOCTYPE html>
<html>
<head>

<title>Login | AI Form Studio</title>

<link rel="stylesheet" 
href="{{ url_for('static', filename='auth.css') }}">

</head>

<body>


<div class="auth-container">


    <div class="auth-logo">

        <h1>
            AI <span>Form Studio</span>
        </h1>

    </div>



    <h2>
        Welcome Back
    </h2>



    <form method="POST">


        <div class="form-group">

            <label>Email</label>

            <input 
            type="email"
            name="email"
            placeholder="Enter your email"
            required>

        </div>



        <div class="form-group">

            <label>Password</label>

            <input 
            type="password"
            name="password"
            placeholder="Enter your password"
            required>

        </div>



        <button class="auth-btn">

            Login

        </button>



    </form>



    <div class="auth-link">

        Don't have an account?

        <a href="/register">
            Register
        </a>

    </div>



</div>


</body>

</html>
